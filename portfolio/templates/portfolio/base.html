{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ hero.name }} | AI/ML & Full Stack Developer</title>
    <link rel="stylesheet" href="{% static 'portfolio/css/style.css' %}" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="#home">{{ hero.name }}</a>
        <nav class="site-nav">
          <a href="#home">Home</a>
          <a href="#projects">Projects</a>
          <a href="#skills">Skills</a>
          <a href="#experience">Experience</a>
          <a href="#contact">Contact</a>
        </nav>
      </div>
    </header>

    <main>{% block content %}{% endblock %}</main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>Connect with me:</p>
        <div class="footer-links">
          <a href="{{ contact.github }}" target="_blank" rel="noopener"
            >GitHub</a
          >
          <a href="{{ contact.linkedin }}" target="_blank" rel="noopener"
            >LinkedIn</a
          >
          <a href="{{ contact.email }}">Email</a>
        </div>
      </div>
    </footer>

    <script src="{% static 'portfolio/js/main.js' %}"></script>
  </body>
</html>
